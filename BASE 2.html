/* ========== KEY NORMALIZER + FIELD ACCESSOR ========== */
function normalizeKey(s) {
  return String(s).toLowerCase()
    .replace(/[º°ª]/g,'a')
    .replace(/[áàâãä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i')
    .replace(/[óòôõö]/g,'o').replace(/[úùûü]/g,'u').replace(/[ñ]/g,'n')
    .replace(/\s+/g,' ').trim();
}
function getField(row, ...keys) {
  for (const key of keys) {
    if (row[key] !== undefined && row[key] !== null && row[key] !== "") return String(row[key]).replace(/\r/g,'').trim();
    const normKey = normalizeKey(key);
    const rowKeys = Object.keys(row);
    const exact = rowKeys.find(k => normalizeKey(k) === normKey);
    if (exact !== undefined) return String(row[exact] || '').replace(/\r/g,'').trim();
    const partial = rowKeys.find(k => normalizeKey(k).includes(normKey));
    if (partial !== undefined) return String(row[partial] || '').replace(/\r/g,'').trim();
  }
  return '';
}
function getFieldExact(row, key) {
  if (row[key] !== undefined && row[key] !== null && row[key] !== "") return String(row[key]).replace(/\r/g,'').trim();
  const normKey = normalizeKey(key);
  const rowKeys = Object.keys(row);
  const exact = rowKeys.find(k => normalizeKey(k) === normKey);
  if (exact !== undefined) return String(row[exact] || '').replace(/\r/g,'').trim();
  return '';
}
function shortVal(v, maxLen=70) { return (v && v.length <= maxLen) ? v : ''; }

/* ========== CSV PARSER ========== */
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = []; let cur = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if ((ch === "\n" || ch === "\r") && !inQ) { const t = cur.replace(/\r/g,'').trim(); if (t) lines.push(t); cur = ""; if (ch === "\r" && text[i+1] === "\n") i++; }
    else cur += ch;
  }
  const t = cur.replace(/\r/g,'').trim(); if (t) lines.push(t);
  const parseRow = l => {
    const f = []; let field = "", q = false;
    for (let i = 0; i < l.length; i++) { const c = l[i]; if (c === '"') { if (q && l[i+1] === '"') { field += '"'; i++; } else q = !q; } else if (c === "," && !q) { f.push(field.trim()); field = ""; } else field += c; }
    f.push(field.trim()); return f;
  };
  const hdr = parseRow(lines[0]).map(h => h.trim().replace(/\s+/g,' '));
  return { headers: hdr, rows: lines.slice(1).map(l => { const v = parseRow(l); const o = {}; hdr.forEach((h,i) => o[h] = (v[i] || "").replace(/\r/g,'').trim()); return o; }).filter(r => r[hdr[0]]) };
}

function detectCSVType(headers, rows) {
  // Detect Acuerdo/Subvencion type first
  const isAcuerdo = headers.some(h => /oficializ/i.test(h));
  if (isAcuerdo) {
    return { memo: "Acuerdos", group: "MKT", label: "Acuerdos \u00b7 MKT", isM2: false, isAcuerdo: true, isPC: false };
  }
  const hasM2 = headers.some(h => /2([.\u00ba\u00aa]|da|a)\s*memoria/i.test(h));
  const hasPres2 = headers.some(h => /presentaci[o\u00f3]n\s*2/i.test(h));
  const isM2 = hasM2 || hasPres2;
  const memo = isM2 ? "Memoria 2" : "Memoria 1";
  // Detect PC type by headers
  const isPC = headers.some(h => /nombre\s*pc/i.test(h)) || headers.some(h => /pc\s*pipeline/i.test(h));
  if (isPC) {
    return { memo, group: "PC", label: `${memo} \u00b7 PC`, isM2, isAcuerdo: false, isPC: true };
  }
  // Default: detect group from product codes in data
  const prods = rows.map(r => extractProduct(getField(r, "Project name", "Nombre PC") || r[headers[1]] || ""));
  const pcC = prods.filter(p => p === "PC").length;
  const mktC = prods.filter(p => p !== "PC" && p !== "OTRO").length;
  const group = pcC > mktC ? "PC" : "MKT";
  return { memo, group, label: `${memo} \u00b7 ${group}`, isM2, isAcuerdo: false, isPC: false };
}

function extractProduct(n) {
  const u = n.toUpperCase();
  for (const [p,v] of Object.entries(PRODUCT_MAP)) if (u.startsWith(p)) return v;
  return "OTRO";
}

/* ========== COLUMN HELPERS (M1/M2/PC/Acuerdo) ========== */
function getDateCol(row, isM2, isAcuerdo) {
  if (isAcuerdo) return getField(row, "Fecha Caducidad Subvenci\u00f3n", "Fecha Caducidad Subvencion");
  if (isM2) return getField(row, "Fecha caducidad 2\u00aa memoria", "Fecha caducidad 2\u00ba memoria", "Fecha caducidad 2a memoria");
  return getField(row, "Fecha caducidad 1\u00ba memoria", "Fecha caducidad 1\u00aa memoria", "Fecha caducidad 1a memoria");
}
function getPresCol(row, isM2, isAcuerdo) {
  if (isAcuerdo) return getField(row, "Fecha Acuerdo Oficializado");
  if (isM2) return getField(row, "Fecha Presentaci\u00f3n 2a Memoria", "Fecha Presentacion 2a Memoria");
  return getField(row, "Fecha Presentaci\u00f3n 1a Memoria", "Fecha Presentacion 1a Memoria");
}
function getEstadoMem(row, isM2, isAcuerdo) {
  if (isAcuerdo) return shortVal(getFieldExact(row, "Estado Subvenci\u00f3n") || getFieldExact(row, "Estado Subvencion"), 60).toUpperCase().trim();
  const v = isM2
    ? getFieldExact(row, "Estado 2a Memoria Project (project)")
    : getFieldExact(row, "Estado 1a Memoria Project (project)");
  return shortVal(v, 60).toUpperCase().trim();
}
function getComment(row, isM2, isAcuerdo) {
  if (isAcuerdo) return getField(row, "Comentarios Oficializaci\u00f3n", "Comentarios Oficializacion");
  if (isM2) return getField(row, "Comentarios Memoria 2", "Comentarios Memoria 1");
  return getField(row, "Comentarios Memoria 1", "Comentarios Memoria 2");
}
function getBajaDate(row) {
  return getField(row, "Fecha baja definitiva - MKT", "Fecha baja definitiva");
}
function getPipeline(row) {
  const v = getFieldExact(row, "Project pipeline stage") || getFieldExact(row, "PC pipeline stage");
  return shortVal(v, 60).toUpperCase().trim();
}

/* ========== UTILS ========== */
function isExpired(d) { if (!d) return false; const dt=new Date(d); dt.setHours(0,0,0,0); return dt < TODAY; }
function daysUntil(d) { if (!d) return 999; const dt=new Date(d); dt.setHours(0,0,0,0); return Math.ceil((dt-TODAY)/86400000); }
function getWeek(d) { if (!d) return 0; const day=new Date(d).getDate(); if (day<=7) return 1; if (day<=14) return 2; if (day<=21) return 3; return 4; }
function getWeekLabel(w) {
  const m = MONTH_CAP.slice(0,3);
  if (w===1) return `1\u20137 ${m}`;
  if (w===2) return `8\u201314 ${m}`;
  if (w===3) return `15\u201321 ${m}`;
  return `22\u2013${DAYS_IN_MONTH} ${m}`;
}

/* ========== CLASSIFICATION ========== */
const PC_CANCELLED_STAGES = ["ACUERDO VENCIDO Y BONO CADUCADO","NO CALIFICADO","DUPLICADOS"];
function isCancelledPipeline(pipeline, isPC) {
  if (isPC) return PC_CANCELLED_STAGES.includes(pipeline);
  return pipeline === "CANCELADO";
}
function isValidDate(s) { return /^\d{4}-\d{2}-\d{2}$/.test(s) && s !== "0000-00-00" && !isNaN(new Date(s).getTime()); }

function hasReverseETL(c1, ops) {
  const c = ((c1||"")+" "+(ops||"")).toLowerCase();
  return c.includes("reversetl") || c.includes("reverse etl") || c.includes("reverse-etl");
}

function classifyStatus(row, isM2, isAcuerdo) {
  if (isAcuerdo) {
    const fp = getField(row, "Fecha Acuerdo Oficializado");
    if (fp && isValidDate(fp)) return "salvado";
    const pipeline = getPipeline(row);
    const c1 = getField(row, "Comentarios Oficializaci\u00f3n", "Comentarios Oficializacion");
    const ops = getField(row, "Comentarios OPS");
    const c = (c1+" "+ops).toLowerCase();
    if (c.startsWith("perdido") || pipeline === "CANCELADO") return "perdido";
    return "en_proceso";
  }
  // SALVADO = UNICAMENTE si tiene fecha de presentacion valida
  const fp = getPresCol(row, isM2);
  if (fp && isValidDate(fp)) return "salvado";

  const pipeline = getPipeline(row);
  const c1 = getComment(row, isM2);
  const ops = getField(row, "Comentarios OPS");

  // ReverseETL con pipeline activo → en_proceso (rescatable)
  if (hasReverseETL(c1, ops) && pipeline !== "CANCELADO") return "en_proceso";

  // Comentario dice perdido explicitamente
  const c = c1.toLowerCase();
  if (c.startsWith("perdido") || c.startsWith("perdida") || c === "duplicado") return "perdido";

  // Estado Acuerdo desistido/renuncia/finalizado
  const ea = getField(row, "Estado Acuerdo").toLowerCase().trim();
  if (ea === "desistido" || ea.includes("renuncia") || ea.includes("finalizado")) return "perdido";

  // Pipeline CANCELADO + indicios de perdida en comentario
  if (pipeline === "CANCELADO") {
    if (c.includes("perdido")||c.includes("perdida")||c.includes("baja")||c.includes("ghost")||c.includes("desist")||c.includes("cancelado")||!c) return "perdido";
  }

  // Check texto completo (MEM + OPS) para bajas definitivas no detectadas antes
  const cFull = ((c1||"")+" "+(ops||"")).toLowerCase();
  if (
    cFull.includes("baja de proyecto") ||
    cFull.includes("solicita baja") || cFull.includes("solicitud de baja") ||
    cFull.includes("se dio de baja") ||
    (cFull.includes("baja") && (cFull.includes("cierre") || cFull.includes("negocio") ||
      cFull.includes("aut\u00f3nomo") || cFull.includes("autonomo") || cFull.includes("jubil"))) ||
    cFull.includes("proyecto cancelado")
  ) return "perdido";

  return "en_proceso";
}

function classifyLossDetailed(c1, ops, row, isAcuerdo) {
  const c = ((c1||"")+" "+(ops||"")).toLowerCase();
  if (isAcuerdo) {
    if (c.includes("sin saldo")||c.includes("importe consumido")) return {cat:"Error tecnico",sub:"Sin saldo disponible",subsub:""};
    if (c.includes("cambio ada")||c.includes("cambio de servicio")||c.includes("cambio servicio")) return {cat:"Baja cliente",sub:"Desistido",subsub:"Cambio servicio"};
    return {cat:"Baja cliente",sub:"Otro motivo baja",subsub:""};
  }
  const ea = getField(row, "Estado Acuerdo").toLowerCase().trim();

  // 1. Cambio servicio
  if (c.includes("cambio de servicio")||c.includes("cambio servicio")||c.includes("cambio a rrss")||c.includes("cambio a web")||c.includes("cambio a fact")||c.includes("solicitud cambio de producto")||c.includes("cambio servicio / rrss"))
    return {cat:"Baja cliente",sub:"Desistido",subsub:"Cambio servicio"};
  // 2. Error de importe
  if (c.includes("error en importe")||c.includes("error de importe")||c.includes("importe incorrecto"))
    return {cat:"Baja cliente",sub:"Desistido",subsub:"Error de importe"};
  // 3a. Incidencia logistica PC
  if (c.includes("pc incorrecto")||c.includes("equipo incorrecto")||c.includes("pc err\u00f3neo")||c.includes("entrega de pc err"))
    return {cat:"Incidencia logistica",sub:"PC incorrecto entregado",subsub:""};
  if ((c.includes("direcci\u00f3n incorrecta")||c.includes("direccion incorrecta")||c.includes("domicilio incorrecto"))&&(c.includes("pc")||c.includes("env\u00edo")||c.includes("envio")))
    return {cat:"Incidencia logistica",sub:"Envio direccion incorrecta",subsub:""};
  if ((c.includes("seur")||c.includes("transportista"))&&(c.includes("perdi\u00f3")||c.includes("perdio")||c.includes("extraviado")))
    return {cat:"Incidencia logistica",sub:"PC perdido en transito",subsub:""};
  if (c.includes("mayorista")&&(c.includes("no gestion")||c.includes("no lleg")||c.includes("a tiempo")||c.includes("caduc")))
    return {cat:"Incidencia logistica",sub:"Fallo mayorista",subsub:""};
  if ((c.includes("no se ha enviado")||c.includes("nunca fue enviado")||c.includes("no se envio")||c.includes("no se envi\u00f3"))&&(c.includes("pc")||c.includes("ordenador")))
    return {cat:"Incidencia logistica",sub:"Falta envio PC",subsub:""};
  if ((c.includes("rotura de stock")||c.includes("no hab\u00eda stock")||c.includes("no habia stock"))&&(c.includes("mac")||c.includes("pc")))
    return {cat:"Incidencia logistica",sub:"Falta envio PC",subsub:""};
  if (c.includes("da\u00f1o pc")||c.includes("dano pc")||c.includes("pantalla rota")||c.includes("pc roto"))
    return {cat:"Incidencia logistica",sub:"Danyo PC",subsub:""};
  // 3b. Pago extra PC
  if ((c.includes("pago extra")||c.includes("pago adicional"))&&(c.includes("mac")||c.includes("pc")||c.includes("ordenador")))
    return {cat:"Baja cliente",sub:"Sin pago extra PC",subsub:""};
  // 3c. Error plataforma Red.es
  if ((c.includes("red.es")||c.includes("red es"))&&(c.includes("error")||c.includes("fallo")||c.includes("no perm")||c.includes("no deja")||c.includes("marca error")||c.includes("genera error")))
    return {cat:"Error tecnico",sub:"Error plataforma Red.es",subsub:""};
  // 3. Problemas PC
  if (c.includes("gesti\u00f3n pc")||c.includes("gestion pc")||c.includes("macbook")||c.includes("inconveniente con pc")||c.includes("entrega del ordenador")||c.includes("rechazo de pc")||c.includes("ordenador pro")||(c.includes("stock")&&(c.includes("pc")||c.includes("ordenador"))))
    return {cat:"Baja cliente",sub:"Descontento servicio",subsub:"Problemas entrega/stock PC"};
  // 4. Sin pago IVA/IGIC (preciso, evitar falsos positivos con "pendiente pago igic")
  if (c.includes("no pago igic")||c.includes("no pago iva")||c.includes("no quiere pagar")||c.includes("no desea pagar")||c.includes("no quiso pagar")||(c.includes("igic")&&(c.includes("no pag")||c.includes("no quiere")||c.includes("exenta")||c.includes("no desea")))||(c.includes("iva")&&(c.includes("no quiere pagar")||c.includes("no pago")||c.includes("no desea pagar"))))
    return {cat:"Sin pago IVA/IGIC",sub:"",subsub:""};
  // 5. Calidad del proyecto
  if (c.includes("calidad")||(c.includes("contenido")&&c.includes("ia"))||c.includes("muy gen\u00e9rico")||c.includes("muy generico")||c.includes("no le gusta")||c.includes("no le gustaba")||c.includes("im\u00e1genes no adecuadas")||c.includes("imagenes no adecuadas")||c.includes("no los convenci\u00f3")||c.includes("no los convencio")||(c.includes("primera presentaci")&&c.includes("ia")))
    return {cat:"Baja cliente",sub:"Descontento servicio",subsub:"Calidad del proyecto"};
  // 6. Atencion recibida
  if (c.includes("atenci\u00f3n recibida")||c.includes("atencion recibida")||c.includes("falta de comunicaci\u00f3n")||c.includes("falta de comunicacion")||c.includes("falta de transparencia")||c.includes("nadie le contact")||c.includes("nadie se ha contactado")||(c.includes("bot")&&c.includes("contact"))||c.includes("mala reputaci\u00f3n")||c.includes("mala reputacion")||c.includes("rese\u00f1as")||c.includes("desatenci\u00f3n")||c.includes("desatencion"))
    return {cat:"Baja cliente",sub:"Descontento servicio",subsub:"Atencion recibida"};
  // 7. No era lo prometido
  if (c.includes("no era lo prometido")||c.includes("pensaban que era")||c.includes("se le oficializ\u00f3")||c.includes("sin su consentimiento")||c.includes("no autorizado"))
    return {cat:"Baja cliente",sub:"Descontento servicio",subsub:"No era lo prometido"};
  // 8. Descontento general
  if (c.includes("descontento")||c.includes("inconformidad")||c.includes("insatisf")||c.includes("no est\u00e1 a gusto")||c.includes("no esta a gusto")||(c.includes("no desea continuar")&&c.includes("servicio")))
    return {cat:"Baja cliente",sub:"Descontento servicio",subsub:"Calidad del proyecto"};
  // 9. Ghosting
  if (/ghost/.test(c)||(c.includes("no contesta")&&!c.includes("baja"))||(c.includes("sin respuesta")&&!c.includes("baja"))||(c.includes("no da respuesta")&&!c.includes("baja")))
    return {cat:"Ghosting",sub:"",subsub:""};
  // 10. Baja autonomo
  if ((c.includes("baja")&&(c.includes("aut\u00f3nomo")||c.includes("autonomo")))||c.includes("jubilaci\u00f3n")||c.includes("jubilacion"))
    return {cat:"Baja cliente",sub:"Baja autonomo",subsub:""};
  // 11. Cierre negocio
  if (((c.includes("cierre")||c.includes("cierra"))&&(c.includes("negocio")||c.includes("empresa")))||c.includes("traspaso")||c.includes("liquidar la empresa")||c.includes("cierra el negocio"))
    return {cat:"Baja cliente",sub:"Cierre de negocio",subsub:""};
  // 12. Sin interes
  if (c.includes("sin inter\u00e9s")||c.includes("sin interes")||c.includes("no quiere")||c.includes("no le interesa")||c.includes("no desea continuar")||c.includes("no quiso nunca")||c.includes("no firmar\u00e1 nada")||c.includes("no firmara nada"))
    return {cat:"Baja cliente",sub:"Sin interes",subsub:""};
  // 13. Imposibilidad personal
  if (c.includes("imposibilidad")||c.includes("motivos personales")||c.includes("problemas de salud")||c.includes("situaci\u00f3n familiar")||c.includes("situacion familiar")||c.includes("no se encuentra en espa\u00f1a")||c.includes("no puede gestionar"))
    return {cat:"Baja cliente",sub:"Imposibilidad personal",subsub:""};
  // 14. Baja general
  if (c.includes("solicitud de baja")||c.includes("solicita baja")||c.includes("baja de proyecto")||c.includes("solicita no continuidad")||(c.includes("baja")&&!c.includes("pdte")))
    return {cat:"Baja cliente",sub:"Otro motivo baja",subsub:""};
  // 15. Desistido genérico
  if (c.includes("desistido")||c.includes("desistimiento")||c.includes("desiste")||c.includes("renuncia")||ea==="desistido"||ea.includes("renuncia"))
    return {cat:"Baja cliente",sub:"Desistido",subsub:"Sin motivo especificado"};
  // 16. ReverseETL (solo llega aqui si pipeline = CANCELADO)
  if (c.includes("reversetl")||c.includes("reverse etl")||c.includes("reverse-etl"))
    return {cat:"Error tecnico",sub:"Error automatizacion",subsub:"ReverseETL"};
  // 17. Duplicado
  if (c.includes("proyecto duplicado")||c.includes("duplicado"))
    return {cat:"Error tecnico",sub:"Error automatizacion",subsub:"Duplicado"};
  // 18. Error tecnico general
  if (c.includes("no gestionado")||c.includes("no apto")||c.includes("bloqueada")||c.includes("error")||c.includes("bono caducado"))
    return {cat:"Error tecnico",sub:c.includes("no apto")?"Proyecto no apto":"Error automatizacion",subsub:""};
  // 19. Fallback
  return {cat:"Baja cliente",sub:"Otro motivo baja",subsub:""};
}

function classifyProcess(c1, ops) {
  const c = ((c1||"")+" "+(ops||"")).toLowerCase();
  if (c.includes("reversetl")||c.includes("reverse etl")||c.includes("reverse-etl")) return "Pdte firma";
  if (c.includes("importe acuerdo no coincide")||c.includes("importe no coincide")||(c.includes("error de importe")&&(c.includes("pc")||c.includes("devoluci")))) return "Error de importe PC";
  if (c.includes("en producci\u00f3n")||c.includes("en produccion")||c.includes("en prod")||(c.includes("gesti\u00f3n")&&c.includes("producci\u00f3n"))||c.includes("produccion entrega")) return "En produccion";
  if (c.includes("pago igic")||c.includes("pago iva")||c.includes("cobro igic")||c.includes("pendiente igic")||c.includes("pendiente iva")) return "Pdte pago IGIC/IVA";
  if (c.includes("rechazo brief")||c.includes("brief vacio")||c.includes("brief vacío")||c.includes("brief rechazado")) return "Rechazo brief";
  if (c.includes("gesti\u00f3n memoria")||c.includes("gestion memoria")||c.includes("borrador")||c.includes("creaci\u00f3n de memoria")||c.includes("actualizaci\u00f3n de memoria")||c.includes("actualizacion de memoria")) return "Gestion memoria";
  if (c.includes("error")&&(c.includes("automatizacion")||c.includes("automatizaci\u00f3n"))) return "Error/Revision";
  return "Pdte firma";
}

function classifyProcessAcuerdo(c1, ops) {
  const c = ((c1||"")+" "+(ops||"")).toLowerCase();
  if (c.includes("importe consumido")||c.includes("sin saldo")) return "Sin saldo disponible";
  if (c.includes("bono no conseguido")||c.includes("sin n\u00ba de bono")||c.includes("sin numero de bono")) return "Bono no conseguido";
  if (c.includes("cambio de servicio")||c.includes("cambio servicio")||c.includes("cambio ada")) return "Cambio servicio";
  if (c.includes("escalado")) return "Escalado";
  return "Sin firma beneficiario";
}

function hasGhosting(c1, ops) {
  const c = ((c1||"")+" "+(ops||"")).toLowerCase();
  return c.includes("ghost")||c.includes("no contesta")||c.includes("no responde")||
    c.includes("sin respuesta")||c.includes("sin exito")||c.includes("sin \u00e9xito")||
    c.includes("no da respuesta")||c.includes("sin obtener respuesta")||
    c.includes("no obtiene respuesta")||c.includes("no atiende")||
    c.includes("no contesto")||c.includes("no respond\u00eda")||
    c.includes("intentos de contacto sin")||c.includes("m\u00faltiples llamadas")||
    c.includes("multiples llamadas")||c.includes("m\u00faltiples ocasiones sin")||
    c.includes("no da respuestas")||c.includes("comunicaciones sin \u00e9xito");
}

function interpret(c1, ops, status, lossDetail, pr, row, isReverseETLFlag, ghostFlag) {
  const parts = [];
  const ct = (c1||"").trim(), ot = (ops||"").trim();
  if (!ct && !ot) {
    if (status === "salvado") return "Memoria presentada ante Red.es. Sin comentarios adicionales.";
    return "Sin informacion de gestion registrada. Requiere revision inmediata.";
  }
  if (status === "salvado") {
    if (ct.toLowerCase().includes("bau")) parts.push("Gestionado por flujo estandar (BAU). Memoria presentada exitosamente.");
    else parts.push("Proyecto rescatado por equipo CSAR. Memoria presentada ante Red.es.");
    if (ot) { let d = ot.replace(/^\d{1,2}\/\d{1,2}\s*[-\u2013]?\s*/,"").split("//")[0].trim().substring(0,200); if (d) parts.push("Gestion: " + d); }
  } else if (status === "perdido") {
    if (lossDetail.cat === "Error tecnico" && lossDetail.subsub === "ReverseETL") {
      parts.push("Perdido por error ReverseETL: la automatizacion modifico la fecha de presentacion. Causa tecnica, no relacionada con la voluntad del cliente.");
    } else {
      parts.push("Causa: " + lossDetail.cat + (lossDetail.sub ? " > " + lossDetail.sub : "") + (lossDetail.subsub ? " > " + lossDetail.subsub : "") + ".");
    }
    if (ot) { let d = ot.replace(/^\d{1,2}\/\d{1,2}\s*[-\u2013]?\s*/,"").split("//")[0].trim(); if (d.length>180) d=d.substring(0,180)+"..."; parts.push(d); }
    else if (ct) { let d = ct.replace(/^perdid[oa]\s*[-\u2013]\s*/i,"").split("//")[0].trim(); if (d.length>180) d=d.substring(0,180)+"..."; parts.push(d); }
  } else {
    if (isReverseETLFlag) {
      parts.push("En recuperacion activa \u2014 error ReverseETL del 13/03. Equipo gestiona firma antes de vencimiento.");
    } else {
      parts.push("Situacion: " + pr + ".");
    }
    if (ghostFlag) parts.push("!! GHOSTING: cliente sin respuesta a comunicaciones. Escalado urgente a CS owner.");
    if (ot) { let d = ot.replace(/^\d{1,2}\/\d{1,2}\s*[-\u2013]?\s*/,"").trim(); if (d.length>200) d=d.substring(0,200)+"..."; parts.push("Ultima gestion: " + d); }
    else if (ct && !isReverseETLFlag) { let d = ct.replace(/^en (proceso|gesti\u00f3n)[-\u2013\s]*/i,"").trim(); if (d.length>150) d=d.substring(0,150)+"..."; if(d) parts.push(d); }
  }
  return parts.join(" ");
}

function Donut({ segments, size=170, thickness=22 }) {
  const [hov, setHov] = useState(null);
  const total = segments.reduce((s,x) => s+x.value, 0);
  if (total === 0) return null;
  const r = (size-thickness)/2, circ = 2*Math.PI*r;
  let off = 0;
  return (
    <svg width={size} height={size} style={{cursor:"default"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={thickness} />
      {segments.filter(s=>s.value>0).map((seg,i) => {
        const dash = (seg.value/total)*circ;
        const el = <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color}
          strokeWidth={hov===i?thickness+6:thickness} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{transition:"all 0.3s",filter:hov===i?`drop-shadow(0 0 8px ${seg.color}80)`:"none"}}
          onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} />;
        off += dash; return el;
      })}
      {hov!==null ? <>
        <text x={size/2} y={size/2-10} textAnchor="middle" fill={segments[hov].color} fontSize={30} fontWeight={800} fontFamily="'Outfit',sans-serif">{segments[hov].value}</text>
        <text x={size/2} y={size/2+12} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize={10} fontWeight={600} fontFamily="'JetBrains Mono',monospace">{segments[hov].label}</text>
        <text x={size/2} y={size/2+26} textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize={9} fontFamily="'JetBrains Mono',monospace">{(segments[hov].value/total*100).toFixed(1)}%</text>
      </> : <>
        <text x={size/2} y={size/2-8} textAnchor="middle" fill="white" fontSize={30} fontWeight={800} fontFamily="'Outfit',sans-serif">{total}</text>
        <text x={size/2} y={size/2+12} textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize={9} fontFamily="'JetBrains Mono',monospace">PROYECTOS</text>
      </>}
    </svg>
  );
}

          <div style={{display:"inline-block",fontSize:9,padding:"2px 6px",borderRadius:4,background:"rgba(249,160,63,0.12)",color:"#F9A03F",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>OPS</div>

function WeekBlock({ items, weekNum, onSelect }) {
  const [open, setOpen] = useState(false);
  const saved = items.filter(r=>r._status==="salvado").length;
  const lost = items.filter(r=>r._status==="perdido").length;
  const proc = items.filter(r=>r._status==="en_proceso").length;
  const todayDay = TODAY.getDate();
  const weekEnd = weekNum===1?7:weekNum===2?14:weekNum===3?21:DAYS_IN_MONTH;

  return <div style={{background:"rgba(255,255,255,0.02)",border:isPast?"1px solid rgba(232,72,85,0.12)":"1px solid rgba(255,255,255,0.04)",borderRadius:12,overflow:"hidden"}}>

              <span style={{color:"#2ECC71"}}>{"\u2713"}{saved}</span>
              <span style={{color:"#E84855"}}>{"\u2715"}{lost}</span>
              <span style={{color:"#F9A03F"}}>{"\u27F3"}{proc}</span>

/* ========== UPCOMING CHART ========== */
function UpcomingChart({ items, onSelectProject }) {
  const [selectedDay, setSelectedDay] = useState(null);
  const [exclCancelled, setExclCancelled] = useState(true);
  const [exclLost, setExclLost] = useState(true);

  const endOfMonth = new Date(TODAY.getFullYear(), TODAY.getMonth()+1, 0);
  endOfMonth.setHours(0,0,0,0);
  const totalDays = Math.max(Math.ceil((endOfMonth-TODAY)/86400000)+1, 1);

  let filtered = items.filter(r => daysUntil(r._dateField) >= 0);
  if (exclCancelled) filtered = filtered.filter(r=>!r._isPipelineCancelled);
  if (exclLost) filtered = filtered.filter(r=>r._status!=="perdido");

  const days = Array.from({length:totalDays}, (_,i) => {
    const date = new Date(TODAY); date.setDate(date.getDate()+i);
    const projects = filtered.filter(r=>daysUntil(r._dateField)===i);
    const dow = date.getDay();
    return {offset:i, day:date.getDate(), weekday:date.toLocaleDateString("es-ES",{weekday:"short"}), projects,
      isToday:i===0, isWeekend:dow===0||dow===6,
      saved:projects.filter(r=>r._status==="salvado").length,
      lost:projects.filter(r=>r._status==="perdido").length,
      proc:projects.filter(r=>r._status==="en_proceso").length};
  });
  const maxCount = Math.max(...days.map(d=>d.projects.length), 1);
  const avgCount = totalDays > 0 ? filtered.length / totalDays : 0;
  const MAX_BAR_PX = 155;
  const avgH = maxCount > 0 ? Math.round((avgCount/maxCount)*MAX_BAR_PX) : 0;
  const selData = selectedDay!==null ? days[selectedDay] : null;

  return (
    <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:22,marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.3,fontFamily:"'JetBrains Mono',monospace"}}>Proximos Vencimientos {"\u2014"} Hoy hasta fin de mes</div>
          <div style={{fontSize:11,opacity:0.3,marginTop:3}}>Haz clic en un dia para ver detalle</div>
        </div>
        <div style={{display:"flex",gap:12}}>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:11,opacity:0.45}}>
            <input type="checkbox" checked={exclLost} onChange={e=>setExclLost(e.target.checked)} style={{accentColor:"#E84855"}} />
            Excluir Perdidos
          </label>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:11,opacity:0.45}}>
            <input type="checkbox" checked={exclCancelled} onChange={e=>setExclCancelled(e.target.checked)} style={{accentColor:"#F9A03F"}} />
            Excluir Cancelados
          </label>
        </div>
      </div>
      <div style={{position:"relative",display:"flex",alignItems:"flex-end",gap:3,height:180,marginBottom:6,paddingBottom:4}}>
        {avgH > 0 && <div style={{position:"absolute",bottom:`calc(${avgH}px + 4px)`,left:0,right:0,height:1,borderTop:"1px dashed rgba(255,255,255,0.15)",pointerEvents:"none",zIndex:1}}>
          <span style={{position:"absolute",right:0,top:-10,fontSize:8,opacity:0.3,fontFamily:"'JetBrains Mono',monospace"}}>media</span>
        </div>}
        {days.map((d,i) => {
          const barPx = d.projects.length===0 ? 0 : Math.max(Math.round((d.projects.length/maxCount)*MAX_BAR_PX), 4);
          const isSel = selectedDay===i;
          return (
            <div key={i} onClick={()=>setSelectedDay(isSel?null:i)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",flex:1,minWidth:18,userSelect:"none",position:"relative"}}>
              {d.projects.length>0 && <div style={{fontSize:9,fontWeight:700,color:isSel?"#F9A03F":d.isToday?"#2ECC71":"rgba(255,255,255,0.45)",marginBottom:3}}>{d.projects.length}</div>}
              <div style={{width:"100%",height:barPx,borderRadius:"3px 3px 0 0",
                background:isSel?"#F9A03F":d.isToday?"rgba(46,204,113,0.35)":d.isWeekend?"rgba(255,255,255,0.05)":d.projects.length===0?"rgba(255,255,255,0.03)":"rgba(255,255,255,0.1)",
                border:isSel?"1px solid #F9A03F60":d.isToday?"1px solid rgba(46,204,113,0.5)":"none",
                transition:"all 0.2s",overflow:"hidden",
                display:"flex",flexDirection:"column",justifyContent:"flex-start"}}>
                {d.projects.length>0&&!isSel&&<>
                  {d.saved>0&&<div style={{flex:d.saved,background:"#2ECC71",minHeight:3}} />}
                  {d.proc>0&&<div style={{flex:d.proc,background:"#F9A03F",minHeight:3}} />}
                  {d.lost>0&&<div style={{flex:d.lost,background:"#E84855",minHeight:3}} />}
                </>}
              </div>
              <div style={{fontSize:d.isToday?9:8,fontFamily:"'JetBrains Mono',monospace",opacity:isSel?1:d.isToday?0.8:d.isWeekend?0.2:0.3,marginTop:4,textAlign:"center",lineHeight:1.2}}>
                <div style={{fontWeight:d.isToday||isSel?700:400,color:d.isToday&&!isSel?"#2ECC71":"inherit"}}>{d.isToday?"HOY":d.day}</div>
                <div style={{fontSize:7,textTransform:"uppercase"}}>{d.weekday}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:16,fontSize:10,opacity:0.4,marginBottom:selData?14:0}}>
        {[["Salvados","#2ECC71"],["En Proceso","#F9A03F"],["Perdidos","#E84855"]].map(([l,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:c}} />{l}</div>
        ))}
        <span style={{marginLeft:"auto",opacity:0.6}}>{filtered.length} proyectos pendientes</span>
      </div>
      {selData && (
        <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:14,marginTop:4}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700,color:"#F9A03F"}}>
              {new Date(TODAY.getFullYear(), TODAY.getMonth(), selData.day).toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"})}
            </span>
            <div style={{display:"flex",gap:12,fontSize:11}}>
              <span style={{color:"#2ECC71"}}>{"\u2713"} {selData.saved}</span>
              <span style={{color:"#F9A03F"}}>{"\u27F3"} {selData.proc}</span>
              <span style={{color:"#E84855"}}>{"\u2715"} {selData.lost}</span>
            </div>
          </div>
          {selData.projects.length===0
            ? <div style={{opacity:0.25,fontSize:12,padding:"12px 0"}}>Sin vencimientos este dia</div>
            : <div style={{maxHeight:260,overflowY:"auto",borderRadius:8,border:"1px solid rgba(255,255,255,0.04)"}}>
                {selData.projects.map((r,i)=><ProjectRow key={i} r={r} onClick={()=>onSelectProject(r)} />)}
              </div>
          }
        </div>
      )}
    </div>
  );
}

/* ========== LOSS HIERARCHY VIEW (3 niveles) ========== */
function LossHierarchy({ data, onSelect }) {
  const [expanded, setExpanded] = useState({});
  const lost = data.filter(r => r._status === "perdido");

  // Construir jerarquia de 3 niveles: cat > sub > subsub
  const hierarchy = {};
  lost.forEach(r => {
    const {cat, sub, subsub} = r._lossDetail;
    if (!hierarchy[cat]) hierarchy[cat] = {total:0, subs:{}, items:[]};
    hierarchy[cat].total++; hierarchy[cat].items.push(r);
    if (sub) {
      if (!hierarchy[cat].subs[sub]) hierarchy[cat].subs[sub] = {count:0, subsubs:{}, items:[]};
      hierarchy[cat].subs[sub].count++; hierarchy[cat].subs[sub].items.push(r);
      if (subsub) {
        if (!hierarchy[cat].subs[sub].subsubs[subsub]) hierarchy[cat].subs[sub].subsubs[subsub] = {count:0, items:[]};
        hierarchy[cat].subs[sub].subsubs[subsub].count++; hierarchy[cat].subs[sub].subsubs[subsub].items.push(r);
      }
    }
  });

  const sorted = Object.entries(hierarchy).sort((a,b) => b[1].total - a[1].total);
  const toggle = k => setExpanded(p => ({...p,[k]:!p[k]}));

  const ProjectItem = ({r}) => (
    <div onClick={()=>onSelect(r)} style={{fontSize:11,padding:"4px 8px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.02)",display:"flex",justifyContent:"space-between",alignItems:"center",opacity:0.5}}
      onMouseEnter={e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.background="rgba(255,255,255,0.02)"}} onMouseLeave={e=>{e.currentTarget.style.opacity="0.5";e.currentTarget.style.background="transparent"}}>
      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"60%"}}>{(r._projectName||r["Project name"]||"").replace(/^KD-\w+:\s*/,"")}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:PRODUCT_COLORS[r._product]||"#636E72"}}>{r._product}</span>
    </div>
  );

  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {sorted.map(([cat, d]) => {
      const info = LOSS_TREE[cat]||{desc:"",color:"#E84855",subs:{}};
      const isExp = expanded[cat];
      const subs = Object.entries(d.subs).sort((a,b) => b[1].count - a[1].count);
      const hasSubs = subs.length > 0;
      return (
        <div key={cat} style={{background:"rgba(255,255,255,0.02)",borderRadius:10,overflow:"hidden",border:`1px solid ${info.color}18`}}>
          {/* Nivel 1: Categoria top */}
          <div onClick={()=>toggle(cat)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"background 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:24,fontWeight:800,color:info.color,fontFamily:"'Outfit',sans-serif",minWidth:36,textAlign:"right"}}>{d.total}</div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:info.color}}>{cat}</div>
                <div style={{fontSize:10,opacity:0.35,marginTop:1}}>{info.desc}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {hasSubs && <div style={{fontSize:10,opacity:0.3,fontFamily:"'JetBrains Mono',monospace"}}>{subs.length} sub</div>}
              <span style={{fontSize:12,opacity:0.3,transform:isExp?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s"}}>{"\u25BC"}</span>
            </div>
          </div>

          {isExp && <div style={{borderTop:`1px solid ${info.color}15`,padding:"8px 16px 12px"}}>
            {hasSubs ? subs.map(([subName, subData]) => {
              const subKey = cat+"/"+subName;
              const isSubExp = expanded[subKey];
              const subsubs = Object.entries(subData.subsubs).sort((a,b) => b[1].count - a[1].count);
              const hasSubsubs = subsubs.length > 0;
              return (
                <div key={subName} style={{marginBottom:6}}>
                  {/* Nivel 2: Subcategoria */}
                  <div onClick={()=>toggle(subKey)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 4px",cursor:"pointer",borderRadius:6,transition:"background 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,opacity:0.3,transform:isSubExp?"rotate(90deg)":"rotate(0)",transition:"transform 0.2s",display:"inline-block"}}>{"\u25B6"}</span>
                      <span style={{fontSize:12,fontWeight:600,opacity:0.75}}>{subName}</span>
                      {hasSubsubs && <span style={{fontSize:9,opacity:0.25,fontFamily:"'JetBrains Mono',monospace"}}>{subsubs.length} det</span>}
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:info.color,fontFamily:"'JetBrains Mono',monospace"}}>{subData.count}</span>
                  </div>

                  {isSubExp && <div style={{marginLeft:16,borderLeft:`2px solid ${info.color}15`,paddingLeft:12}}>
                    {hasSubsubs ? subsubs.map(([ssubName, ssubData]) => {
                      const ssubKey = subKey+"/"+ssubName;
                      const isSsubExp = expanded[ssubKey];
                      return (
                        <div key={ssubName} style={{marginBottom:4}}>
                          {/* Nivel 3: Detalle */}
                          <div onClick={()=>toggle(ssubKey)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px",cursor:"pointer"}}
                            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:4,height:4,borderRadius:2,background:info.color,opacity:0.4}} />
                              <span style={{fontSize:11,opacity:0.6}}>{ssubName}</span>
                            </div>
                            <span style={{fontSize:11,fontWeight:700,color:info.color,opacity:0.7,fontFamily:"'JetBrains Mono',monospace"}}>{ssubData.count}</span>
                          </div>
                          {isSsubExp && <div style={{marginLeft:10,maxHeight:140,overflowY:"auto"}}>
                            {ssubData.items.map((r,i)=><ProjectItem key={i} r={r} />)}
                          </div>}
                        </div>
                      );
                    }) : null}
                    {/* Items sin subsub (directos del nivel 2) */}
                    {!hasSubsubs && <div style={{maxHeight:150,overflowY:"auto"}}>
                      {subData.items.map((r,i)=><ProjectItem key={i} r={r} />)}
                    </div>}
                  </div>}
                </div>
              );
            }) : (
              /* Sin subs: mostrar items directamente (ej: Ghosting, Sin pago) */
              <div style={{maxHeight:200,overflowY:"auto"}}>
                {d.items.map((r,i)=><ProjectItem key={i} r={r} />)}
              </div>
            )}
          </div>}
        </div>
      );
    })}
  </div>;
}

/* ========== PDTE FIRMA DEEPDIVE ========== */

  const withETL = showETL ? pf.filter(r => r._isReverseETL) : [];
  const withGNoETL = pf.filter(r => (showETL ? !r._isReverseETL : true) && r._hasGhosting);
  const normal = pf.filter(r => (showETL ? !r._isReverseETL : true) && !r._hasGhosting);

    <div style={{background:"rgba(249,160,63,0.04)",border:"1px solid rgba(249,160,63,0.1)",borderRadius:14,padding:22}}>

        {thisWeek>0&&<div style={{fontSize:9,padding:"2px 8px",borderRadius:5,background:"rgba(232,72,85,0.15)",color:"#E84855",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>Vencen esta semana: {thisWeek}</div>}

          <div style={{fontSize:20,fontWeight:800,color:"#F9A03F"}}>{normal.length}</div>

          <div style={{fontSize:10,opacity:0.5,marginTop:2}}>Con Ghosting</div>

          <div style={{fontSize:10,opacity:0.5,marginTop:2}}>ReverseETL</div>

          </div>
        ))}
        {list.length===0 && <div style={{padding:16,textAlign:"center",opacity:0.2,fontSize:11}}>Sin proyectos</div>}
      </div>
    </div>
  );
}

/* ========== PDF EXPORT ========== */
function generatePDF(csvType, stats, data) {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF('p','mm','a4');
  const W=210, M=15;
  let y = M;

  // Header
  doc.setFillColor(8,9,14); doc.rect(0,0,W,38,'F');
  doc.setTextColor(249,160,63); doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text('CSAR',M,17);
  doc.setFontSize(8); doc.setTextColor(255,255,255);
  doc.text('COHORT SAVE & RESCUE',M,23);
  doc.setFontSize(9); doc.setTextColor(180,180,180);
  doc.text(csvType?.label||'Dashboard',M,30);
  doc.text('Generado: '+new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}),W-M,30,{align:'right'});
  y = 46;

  // Metrics row
  doc.setTextColor(40,40,40); doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text('Resumen Ejecutivo',M,y); y+=8;
  const metrics=[
    {l:'Total',v:stats.total,c:[60,60,60]},{l:'Salvados',v:stats.saved,c:[46,204,113]},
    {l:'Perdidos',v:stats.lost,c:[232,72,85]},{l:'En Proceso',v:stats.inProcess,c:[249,160,63]},
  ];
  const bw=(W-M*2)/4;
  metrics.forEach((m,i)=>{
    const x=M+i*bw;
    doc.setFillColor(245,245,245); doc.roundedRect(x+1,y,bw-2,20,3,3,'F');
    doc.setFontSize(8); doc.setTextColor(120,120,120); doc.text(m.l,x+bw/2,y+7,{align:'center'});
    doc.setFontSize(16); doc.setTextColor(...m.c); doc.setFont('helvetica','bold');
    doc.text(String(m.v),x+bw/2,y+17,{align:'center'});
  });
  y+=28;

  const saveRate = stats.total>0?((stats.saved/stats.total)*100).toFixed(1):0;
  doc.setFontSize(10); doc.setTextColor(60,60,60);
  doc.text(`Tasa Rescate: ${saveRate}% | Gestionados: ${stats.managed}/${stats.total} | Perdidos con baja: ${stats.lostWithBaja}`,M,y);
  y+=12;

  // Loss categories
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(232,72,85);
  doc.text('Causas de Perdida',M,y); y+=7;
  const lost = data.filter(r=>r._status==="perdido");
  const cats={}; lost.forEach(r=>{cats[r._lossDetail.cat]=(cats[r._lossDetail.cat]||0)+1;});
  doc.setFontSize(9);
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([cat,count])=>{
    if (y>270){doc.addPage();y=M;}
    const pct = lost.length>0?((count/lost.length)*100).toFixed(1):0;
    doc.setTextColor(80,80,80); doc.setFont('helvetica','bold');
    doc.text(`${cat}: ${count} (${pct}%)`,M+2,y);
    doc.setFillColor(230,230,230); doc.rect(M+100,y-3,60,3,'F');
    doc.setFillColor(232,72,85); doc.rect(M+100,y-3,Math.max(60*(count/lost.length),1),3,'F');
    y+=6;
  });
  y+=8;

  // Process
  if(y>260){doc.addPage();y=M;}
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(249,160,63);
  doc.text('En Proceso - Desglose',M,y); y+=7;
  const proc=data.filter(r=>r._status==="en_proceso");
  const pcs={}; proc.forEach(r=>{pcs[r._processReason]=(pcs[r._processReason]||0)+1;});
  doc.setFontSize(9);
  Object.entries(pcs).sort((a,b)=>b[1]-a[1]).forEach(([r,c])=>{
    if(y>270){doc.addPage();y=M;}
    doc.setTextColor(80,80,80); doc.text(`${r}: ${c}`,M+2,y); y+=5;
  });
  const pdte=proc.filter(r=>r._processReason==="Pdte firma");
  const ghost=pdte.filter(r=>r._hasGhosting);
  if(pdte.length>0){y+=3; doc.text(`  Pdte firma con Ghosting: ${ghost.length} de ${pdte.length}`,M,y); y+=8;}

  // Products
  if(y>260){doc.addPage();y=M;}
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(60,60,60);
  doc.text('Desglose por Producto',M,y); y+=7;
  const prods={};
  data.forEach(r=>{if(!prods[r._product])prods[r._product]={s:0,l:0,p:0};if(r._status==="salvado")prods[r._product].s++;else if(r._status==="perdido")prods[r._product].l++;else prods[r._product].p++;});
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  Object.entries(prods).sort((a,b)=>(b[1].s+b[1].l+b[1].p)-(a[1].s+a[1].l+a[1].p)).forEach(([prod,d])=>{
    if(y>270){doc.addPage();y=M;}
    doc.setTextColor(80,80,80);
    doc.text(`${prod}: ${d.s+d.l+d.p} | Salvados: ${d.s} | Perdidos: ${d.l} | En Proceso: ${d.p}`,M+2,y); y+=5;
  });

  // Footer
  doc.setFontSize(7); doc.setTextColor(160,160,160);
  doc.text('CSAR Dashboard - Operaciones ORBIDI',M,290);

  doc.save(`CSAR_${csvType?.label?.replace(/[\s\u00b7]/g,'_')||'informe'}_${new Date().toISOString().slice(0,10)}.pdf`);
}

/* ========== MAIN DASHBOARD ========== */
function CSARDashboard() {
  const [rawData, setRawData] = useState(null);
  const [csvType, setCsvType] = useState(null);
  const [statusFilter, setStatusFilter] = useState(null);
  const [productFilter, setProductFilter] = useState(null);
  const [selectedRow, setSelectedRow] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [view, setView] = useState("overview");
  const [excludeCancelled, setExcludeCancelled] = useState(true);
  const fileRef = useRef(null);

  const handleFile = useCallback(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try { const {headers,rows}=parseCSV(e.target.result); const ct=detectCSVType(headers,rows); setCsvType(ct); setRawData({rows,isM2:ct.isM2,isAcuerdo:ct.isAcuerdo||false,isPC:ct.isPC||false}); }
      catch(err) { alert("Error: "+err.message); }
    };
    reader.readAsText(file,"UTF-8");
  },[]);

  const enriched = useMemo(() => {
    if (!rawData) return [];
    const {rows, isM2, isAcuerdo, isPC} = rawData;
    return rows.map(row => {
      const projectName = getField(row, "Project name", "Nombre PC");
      const status = classifyStatus(row, isM2, isAcuerdo);
      const product = extractProduct(projectName);
      const c1 = getComment(row, isM2, isAcuerdo);
      const ops = getField(row, "Comentarios OPS");
      const ld = status==="perdido"?classifyLossDetailed(c1,ops,row,isAcuerdo):{cat:"",sub:"",subsub:""};
      const pr = status==="en_proceso"?(isAcuerdo?classifyProcessAcuerdo(c1,ops):classifyProcess(c1,ops)):"";
      const dateField = getDateCol(row, isM2, isAcuerdo);
      const ghost = hasGhosting(c1, ops);
      const rawPipeline = getFieldExact(row, "Project pipeline stage") || getFieldExact(row, "PC pipeline stage");
      const pipeline = shortVal(rawPipeline, 60).toUpperCase().trim();
      const isPipelineCancelled = isCancelledPipeline(pipeline, isPC);
      const isPdteDevolucion = isPC && normalizeKey(rawPipeline).includes("devolucion");
      const bajaDate = getBajaDate(row);
      const estadoMem = getEstadoMem(row, isM2, isAcuerdo);
      const hasETL = hasReverseETL(c1, ops);
      const estadoAcuerdo = shortVal(getFieldExact(row, "Estado Acuerdo"), 50);
      const isETLActive = hasETL && status === "en_proceso";
      return {...row, _projectName:projectName, _status:status, _product:product, _week:getWeek(dateField), _expired:isExpired(dateField),
        _lossDetail:ld, _processReason:pr, _interpretation:interpret(c1,ops,status,ld,pr,row,isETLActive,ghost),
        _managed:!!c1.trim()||!!ops.trim(), _dateField:dateField, _isPipelineCancelled:isPipelineCancelled,
        _hasGhosting:ghost, _hasBajaDate:!!bajaDate, _commentField:c1, _estadoMem:estadoMem,
        _isReverseETL:hasETL, _opsComment:ops, _estadoAcuerdo:estadoAcuerdo, _pipeline:pipeline, _isAcuerdo:isAcuerdo,
        _isPdteDevolucion:isPdteDevolucion};
    });
  },[rawData]);

  // Base data: excluir cancelados del pipeline si checkbox activo
  const baseData = useMemo(() => {
    return excludeCancelled ? enriched.filter(r => !r._isPipelineCancelled) : enriched;
  }, [enriched, excludeCancelled]);

  // Filtro producto
  const pf = useMemo(() => {
    if (!productFilter) return baseData;
    if (productFilter === "__SERV__") return baseData.filter(r=>SERVICE_PRODUCTS.includes(r._product));
    if (productFilter === "__FACT__") return baseData.filter(r=>r._product==="FACT");
    return baseData.filter(r=>r._product===productFilter);
  }, [baseData,productFilter]);

  const stats = useMemo(() => {
    const t=pf.length, s=pf.filter(r=>r._status==="salvado").length, l=pf.filter(r=>r._status==="perdido").length, p=pf.filter(r=>r._status==="en_proceso").length;
    const m=pf.filter(r=>r._managed).length;
    const lostWithBaja=pf.filter(r=>r._status==="perdido"&&r._hasBajaDate).length;
    const pdteDevolucion=pf.filter(r=>r._isPdteDevolucion).length;
    const pr={};
    pf.forEach(r=>{if(r._status==="en_proceso") pr[r._processReason]=(pr[r._processReason]||0)+1;});
    return {total:t,saved:s,lost:l,inProcess:p,managed:m,lostWithBaja,pdteDevolucion,processReasons:pr};
  },[pf]);

  const tableData = useMemo(() => {
    let items = pf;
    if (statusFilter) items=items.filter(r=>r._status===statusFilter);
    if (searchTerm) {
      const t=searchTerm.toLowerCase();
      items=items.filter(r=>(r._projectName||r["Project name"]||"").toLowerCase().includes(t)||(r._interpretation||"").toLowerCase().includes(t)||(r["Comentarios OPS"]||"").toLowerCase().includes(t)||(r._commentField||"").toLowerCase().includes(t)||(r["ID de registro"]||"").includes(t));
    }
    return items;
  },[pf,statusFilter,searchTerm]);

  /* UPLOAD SCREEN */
  if (!rawData) {
    return <div onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();e.dataTransfer.files[0]&&handleFile(e.dataTransfer.files[0])}}
      style={{minHeight:"100vh",background:"#08090E",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Outfit',-apple-system,sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <div style={{textAlign:"center",maxWidth:540,padding:32}}>
        <div style={{fontSize:56,fontWeight:900,marginBottom:6,background:"linear-gradient(135deg,#F9A03F,#E84855)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.02em"}}>CSAR</div>
        <div style={{fontSize:12,opacity:0.3,marginBottom:12,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.15em"}}>COHORT SAVE & RESCUE</div>
        <div style={{fontSize:14,opacity:0.45,marginBottom:40,lineHeight:1.6,maxWidth:420,margin:"0 auto 40px"}}>
          Analisis y rescate de memorias en riesgo de caducidad.<br/>Cada dia cuenta {"\u2014"} nuestra mision es salvar cada proyecto.
        </div>
        <div onClick={()=>fileRef.current?.click()} style={{border:"2px dashed rgba(255,255,255,0.1)",borderRadius:20,padding:"44px 36px",cursor:"pointer",transition:"all 0.3s",background:"rgba(255,255,255,0.01)"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="#F9A03F";e.currentTarget.style.background="rgba(249,160,63,0.03)"}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.1)";e.currentTarget.style.background="rgba(255,255,255,0.01)"}}>
          <div style={{fontSize:36,marginBottom:12}}>{"\uD83D\uDCC4"}</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Arrastra tu CSV aqui o haz clic</div>
          <div style={{fontSize:11,opacity:0.3,fontFamily:"'JetBrains Mono',monospace"}}>Mem 1 MKT {"\u00b7"} Mem 2 MKT {"\u00b7"} Mem 1 PC {"\u00b7"} Mem 2 PC {"\u00b7"} Acuerdos</div>
        </div>
        <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])} />
      </div>
    </div>;
  }

  /* COMPUTED */
  const saveRate = stats.total>0?((stats.saved/stats.total)*100).toFixed(1):0;
  const processData = Object.entries(stats.processReasons).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({label:l,value:v,color:"#F9A03F",desc:PROCESS_CATEGORIES[l]||""}));
  const allProducts = [...new Set(enriched.map(r=>r._product))].filter(p=>p!=="OTRO").sort();
  const prodBreak = allProducts.map(p=>{const items=pf.filter(r=>r._product===p); return {name:p,total:items.length,saved:items.filter(r=>r._status==="salvado").length,lost:items.filter(r=>r._status==="perdido").length,proc:items.filter(r=>r._status==="en_proceso").length};}).filter(p=>p.total>0).sort((a,b)=>b.total-a.total);

  const cancelledCount = enriched.filter(r=>r._isPipelineCancelled).length;

  return <div style={{minHeight:"100vh",background:"#08090E",color:"#fff",fontFamily:"'Outfit',-apple-system,sans-serif"}}>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    {/* HEADER */}
    <div style={{padding:"14px 28px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#08090EF0",zIndex:100,backdropFilter:"blur(12px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:20,fontWeight:800,background:"linear-gradient(135deg,#F9A03F,#E84855)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CSAR</div>
        {csvType && <div style={{fontSize:9,padding:"3px 8px",borderRadius:5,background:"rgba(255,255,255,0.05)",fontFamily:"'JetBrains Mono',monospace",opacity:0.4,fontWeight:600}}>{csvType.label}</div>}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {["overview","perdidos","en_proceso"].map(v=><button key={v} onClick={()=>setView(v)} style={{
          background:view===v?"rgba(249,160,63,0.12)":"rgba(255,255,255,0.03)",
          border:view===v?"1px solid rgba(249,160,63,0.4)":"1px solid rgba(255,255,255,0.06)",
          color:view===v?"#F9A03F":"rgba(255,255,255,0.4)", padding:"7px 14px", borderRadius:8, cursor:"pointer", fontSize:11, fontWeight:600, fontFamily:"'JetBrains Mono',monospace",
        }}>{v==="overview"?"General":v==="perdidos"?"Perdidos":"En Proceso"}</button>)}
        <div style={{width:1,height:20,background:"rgba(255,255,255,0.06)",margin:"0 4px"}} />
        <button onClick={()=>generatePDF(csvType, stats, pf)} style={{background:"rgba(232,72,85,0.08)",border:"1px solid rgba(232,72,85,0.2)",color:"#E84855",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>PDF</button>
        <button onClick={()=>{setRawData(null);setCsvType(null);setStatusFilter(null);setProductFilter(null);setSearchTerm("");setView("overview");setExcludeCancelled(true)}}
          style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.35)",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>Nuevo CSV</button>

    <div style={{padding:"20px 28px",maxWidth:1420,margin:"0 auto"}}>

        <div style={{fontSize:28}}>{"\uD83C\uDFAF"}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>Objetivo CSAR</div>

          <div style={{fontSize:28,fontWeight:800,color:"#2ECC71",fontFamily:"'Outfit',sans-serif"}}>{saveRate}%</div>
          <div style={{fontSize:10,opacity:0.3,fontFamily:"'JetBrains Mono',monospace"}}>TASA RESCATE</div>
        </div>
      </div>

      {/* GLOBAL FILTERS */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>

        <MetricBox label="Perdidos" value={stats.lost} icon={"\u2715"} color="#E84855" sub={`${stats.total>0?((stats.lost/stats.total)*100).toFixed(1):0}% del total`} onClick={()=>setStatusFilter(statusFilter==="perdido"?null:"perdido")} active={statusFilter==="perdido"} />
        <MetricBox label="En Proceso" value={stats.inProcess} icon={"\u27F3"} color="#F9A03F" sub="Aun rescatables" onClick={()=>setStatusFilter(statusFilter==="en_proceso"?null:"en_proceso")} active={statusFilter==="en_proceso"} />
        <MetricBox label="Con Baja Definitiva" value={stats.lostWithBaja} icon={"\u2715"} color="#C0392B" sub="Perdidos con fecha baja" />
        {csvType?.isPC && stats.pdteDevolucion > 0 &&
          <MetricBox label="Pdte Devoluci\u00f3n PC" value={stats.pdteDevolucion} icon={"\u21A9"} color="#E67E22" sub="Con devolucion pendiente" />}
      </div>

      {/* === OVERVIEW === */}
      {view==="overview" && <>
        <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:16,marginBottom:20}}>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:22,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.3,marginBottom:14,fontFamily:"'JetBrains Mono',monospace"}}>Distribucion</div>
            <Donut segments={[{value:stats.saved,color:"#2ECC71",label:"Salvados"},{value:stats.lost,color:"#E84855",label:"Perdidos"},{value:stats.inProcess,color:"#F9A03F",label:"En Proceso"}]} />
            <div style={{display:"flex",gap:16,marginTop:14}}>
              {[["Salvados","#2ECC71"],["Perdidos","#E84855"],["En Proceso","#F9A03F"]].map(([l,c])=><div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,opacity:0.45}}><div style={{width:8,height:8,borderRadius:2,background:c}} />{l}</div>)}
            </div>
          </div>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:22}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.3,marginBottom:14,fontFamily:"'JetBrains Mono',monospace"}}>Desglose por Producto</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:10}}>
              {prodBreak.map(p=><div key={p.name} onClick={()=>setProductFilter(productFilter===p.name?null:p.name)}
                style={{background:"rgba(255,255,255,0.02)",borderRadius:10,padding:14,cursor:"pointer",border:productFilter===p.name?`1px solid ${PRODUCT_COLORS[p.name]}50`:"1px solid rgba(255,255,255,0.03)",transition:"all 0.2s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontWeight:700,color:PRODUCT_COLORS[p.name],fontSize:13}}>{p.name}</span>
                  <span style={{fontSize:20,fontWeight:800}}>{p.total}</span>
                </div>
                <div style={{display:"flex",gap:3,height:6,borderRadius:3,overflow:"hidden",marginBottom:8}}>
                  {p.saved>0&&<div style={{flex:p.saved,background:"#2ECC71",borderRadius:3}} />}
                  {p.lost>0&&<div style={{flex:p.lost,background:"#E84855",borderRadius:3}} />}
                  {p.proc>0&&<div style={{flex:p.proc,background:"#F9A03F",borderRadius:3}} />}
                </div>
                <div style={{display:"flex",gap:10,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
                  <span style={{color:"#2ECC71"}}>{"\u2713"}{p.saved}</span><span style={{color:"#E84855"}}>{"\u2715"}{p.lost}</span><span style={{color:"#F9A03F"}}>{"\u27F3"}{p.proc}</span>
                </div>
              </div>)}
            </div>
          </div>
        </div>
        {/* WEEKLY */}
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:22,marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.3,fontFamily:"'JetBrains Mono',monospace",marginBottom:14}}>Vencimientos por Semana {"\u2014"} {MONTH_CAP} {TODAY.getFullYear()}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:10}}>
            {[1,2,3,4].map(w=>{
              const wi = pf.filter(r=>r._week===w);
              return <WeekBlock key={w} items={wi} weekNum={w} onSelect={setSelectedRow} />;
            })}
          </div>
        </div>
        <UpcomingChart items={pf} onSelectProject={setSelectedRow} />
      </>}

      {/* === PERDIDOS === */}
      {view==="perdidos" && <>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          <div style={{background:"rgba(232,72,85,0.04)",border:"1px solid rgba(232,72,85,0.1)",borderRadius:14,padding:22}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.4,fontFamily:"'JetBrains Mono',monospace",marginBottom:4,color:"#E84855"}}>Analisis de Causas {"\u2014"} Jerarquico</div>
            <div style={{fontSize:11,opacity:0.35,marginBottom:16}}>Categorias &gt; Subcategorias &gt; Proyectos (clic para expandir)</div>
            <LossHierarchy data={pf} onSelect={setSelectedRow} />
          </div>
          <div style={{background:"rgba(232,72,85,0.04)",border:"1px solid rgba(232,72,85,0.1)",borderRadius:14,padding:22}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.4,fontFamily:"'JetBrains Mono',monospace",marginBottom:4,color:"#E84855"}}>Resumen Visual de Causas</div>
            <div style={{fontSize:11,opacity:0.35,marginBottom:16}}>Distribucion por categoria principal</div>
            {(() => {
              const lost = pf.filter(r=>r._status==="perdido");
              // Nivel 1: categorias top
              const cats={}; lost.forEach(r=>{cats[r._lossDetail.cat]=(cats[r._lossDetail.cat]||0)+1;});
              const ld = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({label:l,value:v,color:LOSS_TREE[l]?.color||"#E84855",desc:LOSS_TREE[l]?.desc||""}));
              // Nivel 2: subcategorias (solo de Baja cliente)
              const subs={}; lost.filter(r=>r._lossDetail.cat==="Baja cliente"&&r._lossDetail.sub).forEach(r=>{subs[r._lossDetail.sub]=(subs[r._lossDetail.sub]||0)+1;});
              const sd = Object.entries(subs).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({label:l,value:v,color:"#E8485590",desc:""}));
              return <>
                <HBar data={ld} />
                {sd.length>0 && <>
                  <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.25,fontFamily:"'JetBrains Mono',monospace",marginTop:16,marginBottom:8}}>Desglose Baja Cliente</div>
                  <HBar data={sd} />
                </>}
              </>;
            })()}
            <div style={{marginTop:20,padding:14,background:"rgba(255,255,255,0.02)",borderRadius:10}}>
              <div style={{fontSize:10,fontWeight:600,opacity:0.4,marginBottom:8,fontFamily:"'JetBrains Mono',monospace"}}>PERDIDOS CON FECHA BAJA DEFINITIVA</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:28,fontWeight:800,color:"#C0392B",fontFamily:"'Outfit',sans-serif"}}>{stats.lostWithBaja}</div>
                <div style={{fontSize:11,opacity:0.4,lineHeight:1.4}}>de {stats.lost} perdidos tienen fecha de baja definitiva registrada</div>
              </div>
            </div>
          </div>
        </div>
      </>}

      {/* === EN PROCESO === */}
      {view==="en_proceso" && <>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          <div style={{background:"rgba(249,160,63,0.04)",border:"1px solid rgba(249,160,63,0.1)",borderRadius:14,padding:22}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.4,fontFamily:"'JetBrains Mono',monospace",marginBottom:4,color:"#F9A03F"}}>En que estan los proyectos?</div>
            <div style={{fontSize:11,opacity:0.35,marginBottom:16}}>Desglose por sub-estado</div>
            <HBar data={processData} />
            <div style={{marginTop:14}}>
              {processData.map((d,i)=><div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"6px 8px",marginBottom:4}}>
                <div style={{fontSize:9,opacity:0.3,minWidth:20,textAlign:"right",fontFamily:"'JetBrains Mono',monospace"}}>{d.value}</div>
                <div style={{fontSize:10,opacity:0.4,lineHeight:1.4}}><span style={{fontWeight:600}}>{d.label}</span>: {d.desc}</div>
              </div>)}
            </div>
          </div>
          <PdteFirmaDeepDive items={pf} onSelect={setSelectedRow} csvType={csvType} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
          {[
            {label:"YA VENCIDOS",items:pf.filter(r=>r._status==="en_proceso"&&r._expired),color:"#E84855",icon:"\uD83D\uDD34"},
            {label:"VENCEN EN \u22645 DIAS",items:pf.filter(r=>r._status==="en_proceso"&&!r._expired&&daysUntil(r._dateField)<=5),color:"#F9A03F",icon:"\uD83D\uDFE0"},
            {label:"TIENEN MARGEN (+5d)",items:pf.filter(r=>r._status==="en_proceso"&&daysUntil(r._dateField)>5),color:"#2ECC71",icon:"\uD83D\uDFE2"},
          ].map((g,i)=><div key={i} style={{background:`${g.color}08`,border:`1px solid ${g.color}20`,borderRadius:12,padding:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'JetBrains Mono',monospace",color:g.color}}>{g.icon} {g.label}</div>
              <div style={{fontSize:26,fontWeight:800,color:g.color}}>{g.items.length}</div>
            </div>
            <div style={{maxHeight:200,overflowY:"auto"}}>
              {g.items.map((r,j)=><div key={j} onClick={()=>setSelectedRow(r)} style={{fontSize:11,padding:"6px 8px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.02)",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{opacity:0.6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"55%"}}>{(r._projectName||r["Project name"]||"").replace(/^KD-\w+:\s*/,"")}</span>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",opacity:0.3,fontSize:10}}>{r._processReason}</span>
                  {r._hasGhosting && <span style={{fontSize:8,color:"#9B59B6",fontWeight:700}}>GHOST</span>}
                  {r._isReverseETL && <span style={{fontSize:8,color:"#F39C12",fontWeight:700}}>ETL</span>}
                </div>
              </div>)}
            </div>
          </div>)}
        </div>
      </>}

      {/* === TABLE === */}
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.3,fontFamily:"'JetBrains Mono',monospace"}}>Proyectos</span>
            <span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"rgba(249,160,63,0.12)",color:"#F9A03F",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{tableData.length}</span>
            {(statusFilter||productFilter)&&<button onClick={()=>{setStatusFilter(null);setProductFilter(null)}} style={{background:"rgba(255,255,255,0.05)",border:"none",color:"rgba(255,255,255,0.4)",padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{"\u2715"} Limpiar</button>}
          </div>
          <input type="text" placeholder="Buscar proyecto o ID..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
            style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",color:"#fff",padding:"7px 12px",borderRadius:7,width:260,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:"none"}} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"36px 1fr 72px 80px 130px 36px",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.2,fontFamily:"'JetBrains Mono',monospace"}}>
          <div></div><div>Proyecto</div><div style={{textAlign:"center"}}>Prod</div><div>Caduca</div><div style={{textAlign:"center"}}>Estado</div><div></div>
        </div>
        <div style={{maxHeight:520,overflowY:"auto"}}>
          {tableData.length===0?<div style={{padding:40,textAlign:"center",opacity:0.2}}>Sin resultados</div>
          :tableData.map((r,i)=><ProjectRow key={i} r={r} onClick={()=>setSelectedRow(r)} />)}
        </div>
      </div>

      {/* FOOTER */}
      <div style={{marginTop:20,padding:"14px 0",borderTop:"1px solid rgba(255,255,255,0.03)",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10,opacity:0.2,fontFamily:"'JetBrains Mono',monospace"}}>
        <span>CSAR Dashboard {"\u00b7"} Operaciones ORBIDI</span>
        <span>{stats.total} proyectos {"\u00b7"} {TODAY_STR}</span>
      </div>
    </div>

    {/* DETAIL PANEL */}
    {selectedRow&&<><div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:999}} onClick={()=>setSelectedRow(null)} /><DetailPanel r={selectedRow} onClose={()=>setSelectedRow(null)} /></>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<CSARDashboard />);
  </script>
</body>
</html>
